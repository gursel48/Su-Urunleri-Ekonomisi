<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sınav Portalı</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
      padding-bottom: 80px;
    }

    .app-shell {
      width: 100%;
      max-width: 860px;
    }

    .menu-container, .quiz-container {
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .menu-btn {
      border: none;
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      cursor: pointer;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
    }

    .menu-btn.locked {
      background: linear-gradient(135deg, #6c757d, #495057);
      cursor: not-allowed;
      order: 999;
      opacity: 0.85;
    }

    .quiz-container {
      display: none;
      position: relative;
      padding-top: 85px;
      min-height: 100vh;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 6px;
      background: #28a745;
      transition: 0.3s;
      width: 0%;
      border-radius: 14px 14px 0 0;
    }

    .main-menu-btn {
      border: none;
      background: none;
      cursor: pointer;
      font-weight: bold;
      font-size: calc(1rem + 4pt);
      color: #333;
      padding: 5px 0;
    }

    .header-info {
      position: absolute;
      top: 15px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding-right: 110px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
      flex: 1;
      flex-wrap: wrap;
    }

    .header-subject {
      font-weight: normal;
      color: #777;
      font-size: 0.95rem;
      line-height: 1.35;
      word-break: break-word;
    }

    .retry-badge {
      display: none;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffe69c;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .question-title {
      margin-top: 0;
      margin-bottom: 16px;
      line-height: 1.45;
      font-size: 1.2rem;
      color: #222;
    }

    .option-btn {
      width: 100%;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 2px solid #e9ecef;
      background: #f8f9fa;
      text-align: left;
      cursor: pointer;
      font-size: 1.05rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
      position: relative;
    }

    .option-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.correct {
      background: #d4edda !important;
      border-color: #28a745 !important;
      color: #155724 !important;
      font-weight: bold;
    }

    .option-btn.wrong {
      background: #f8d7da !important;
      border-color: #dc3545 !important;
      color: #721c24 !important;
      font-weight: bold;
    }

    .tick {
      display: inline-block;
      margin-left: 10px;
      color: #1f9d45;
      font-weight: bold;
      opacity: 0;
      transform: scale(0.4);
    }

    .tick.show {
      animation: popTick 0.45s ease forwards;
    }

    @keyframes popTick {
      0%   { opacity: 0; transform: scale(0.4); }
      60%  { opacity: 1; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }

    .explanation {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: #eaf2f8;
      border-left: 5px solid #2980b9;
      border-radius: 8px;
      line-height: 1.5;
    }

    .nav-controls {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .nav-btn {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .next-btn { background: #007bff; }
    .prev-btn {
      background: #e9ecef;
      color: #dc3545 !important;
      border: 1px solid #ddd;
    }

    .quiz-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      color: #666;
      font-weight: bold;
      font-size: 0.9rem;
      flex-wrap: wrap;
    }

    .disclaimer-box {
      margin-top: 20px;
      padding: 15px;
      background: #fdfdfd;
      border: 1px solid #eee;
      border-radius: 10px;
      color: #888;
      font-size: 0.8rem;
      line-height: 1.4;
      text-align: center;
    }

    .disclaimer-title {
      display: block;
      font-weight: bold;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      font-size: 0.7rem;
    }

    .source-tag {
      position: fixed;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.05);
      color: #777;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: bold;
      z-index: 9999;
    }

    .reset-set-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      background: #ffc107;
      border: none;
      padding: 8px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 5;
    }

    @media (max-width: 480px) {
      .quiz-container {
        padding-top: 110px;
      }

      .header-info {
        top: 12px;
        left: 12px;
        right: 12px;
        padding-right: 104px;
        align-items: flex-start;
      }

      .header-left {
        display: block;
        padding-right: 6px;
      }

      .main-menu-btn {
        display: block;
        font-size: 0.95rem;
        padding: 0;
        margin-bottom: 6px;
      }

      .header-subject {
        display: block;
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.3;
        max-width: 100%;
      }

      .question-title {
        font-size: 1.05rem;
      }

      .option-btn {
        font-size: 1rem;
        padding: 14px;
      }

      .reset-set-btn {
        top: 12px;
        right: 12px;
        font-size: 0.75rem;
        padding: 7px 10px;
      }
    }
  </style>
</head>
<body>

<div class="app-shell">
  <div id="menuContainer" class="menu-container">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px;">
      <h1 id="mainTitle" style="margin:0;">Yükleniyor...</h1>
      <button onclick="clearAllStatistics()" style="background:#dc3545; color:white; border:none; padding:8px 10px; border-radius:8px; cursor:pointer; font-size:0.75rem;">
        Verileri Sıfırla
      </button>
    </div>

    <div id="menuGrid" class="menu-grid"></div>

    <div class="disclaimer-box">
      <span class="disclaimer-title">⚠️ Önemli Uyarı</span>
      Bu sistemde yer alan içerikler yalnızca eğitim amaçlıdır. İçeriklerin kullanımından doğabilecek doğrudan veya dolaylı hiçbir sorumluluk kabul edilmez. Tüm kullanım sorumluluğu kullanıcıya aittir.
    </div>
  </div>

  <div id="quizContainer" class="quiz-container">
    <div class="progress-bar" id="progressBar"></div>

    <div class="header-info">
      <div class="header-left">
        <button onclick="showMenu()" class="main-menu-btn">☰ Ana Menü</button>
        <span id="headerSubject" class="header-subject"></span>
      </div>
    </div>

    <button onclick="resetCurrentSet()" class="reset-set-btn">Seti Sıfırla</button>

    <div id="retryBadge" class="retry-badge">Yalnış cevaplanan soru</div>
    <h2 id="questionText" class="question-title">...</h2>

    <div id="optionsArea"></div>

    <div class="quiz-footer">
      <div id="footerLeft">Kalan: 0</div>
      <div id="footerRight">0 / 0</div>
    </div>

    <div id="explanationArea" class="explanation"></div>

    <div class="nav-controls">
      <button id="prevBtn" class="nav-btn prev-btn" onclick="goBack()" style="visibility:hidden;">❮ Önceki</button>
      <button id="nextBtn" class="nav-btn next-btn" onclick="goForward()" style="visibility:hidden;">Yeni Soru ❯</button>
    </div>
  </div>
</div>

<div class="source-tag" id="sourceTag">Kaynak: ...</div>

<script>
  const CURRENT_SUBJECT = "Su Ürünleri Ekononisi";
  const SOURCE_TEXT = "Kaynak: geminigysmer";
  const QUESTIONS_PER_SET = 30;

  const questions = [
    {
      q: "Su ürünleri sektörünün temel değer zinciri (supply chain) içinde aşağıdakilerden hangisi doğrudan yer almaz?",
      o: ["Yem sanayisi", "Ağ ve kafes donanım teknolojileri", "Tüketici kredi finansmanı", "Soğuk zincir lojistiği ve pazarlama"],
      c: 2,
      e: "Çözüm-1: C - [Sektörün değer zinciri; yem sanayisi, ağ ve kafes donanım teknolojileri, işleme ve paketleme sanayisi, soğuk zincir lojistiği ve pazarlama organizasyonları olarak belirtilmiştir. Tüketici kredi finansmanı bu üretim ve tedarik değer zincirinde geçmemektedir.]"
    },
    {
      q: "FAO verilerine göre dünya su ürünleri üretiminde yaklaşık 90-95 milyon ton seviyesinde doyum noktasına ulaşan ve artık artış göstermeyen üretim alanı hangisidir?",
      o: ["Deniz ve İç Su Yetiştiriciliği", "Deniz Avcılığı", "Konserve Sanayisi", "Su Yosunu (Alg) Üretimi"],
      c: 1,
      e: "Çözüm-2: B - [Küresel deniz avcılığı stokları Maksimum Sürdürülebilir Verim (MSY) sınırlarına ulaştığı ve bazı bölgelerde bu sınır aşıldığı için, avcılık yoluyla elde edilen miktar 1990'ların sonundan beri 90-95 milyon ton bandında sabit kalmıştır. Büyüme tamamen yetiştiricilikten gelmektedir.]"
    },
    {
      q: "Türkiye'nin 8.333 km kıyı şeridine ve geniş iç su kaynaklarına sahip olması, su ürünleri ekonomisinde hangi temel rekabet avantajını yaratmaktadır?",
      o: ["Mutlak monopol gücü", "Doğal kaynak ve lojistik (pazara yakınlık) avantajı", "Döviz kurlarından etkilenmeme avantajı", "İşgücü maliyetlerinin sıfırlanması"],
      c: 1,
      e: "Çözüm-3: B - [Geniş kıyı şeridi ve su kaynakları üretim kapasitesini (doğal kaynak) artırırken, özellikle Avrupa ve Orta Doğu pazarlarına olan coğrafi yakınlık, taze soğutulmuş ürünlerin kısa sürede pazara ulaştırılmasını (lojistik avantaj) sağlamaktadır.]"
    },
    {
      q: "Türk balıkçılık ekonomisinin sürdürülebilirliği ve balık unu/yağı sanayisinin hammadde tedariki açısından en kritik öneme sahip pelajik tür aşağıdakilerden hangisidir?",
      o: ["Lüfer", "Palamut", "Hamsi", "Kalkan"],
      c: 2,
      e: "Çözüm-4: C - [Türkiye deniz avcılığının miktar olarak %60-70'ini tek başına hamsi oluşturmaktadır. Hamsi hem doğrudan insan tüketiminde hem de su ürünleri yetiştiriciliğinin en önemli girdisi olan balık unu ve balık yağı fabrikalarının ana hammaddesi olarak sektörün belkemiğidir.]"
    },
    {
      q: "Su ürünleri ekonomisinde \"Maksimum Sürdürülebilir Verim\" (MSY) kavramı neyi ifade etmektedir?",
      o: ["Filodaki en büyük teknenin avlama kapasitesini", "Balık popülasyonunun kendini yenileme yeteneğini bozmadan (stokları tüketmeden) yıllık olarak avlanabilecek azami miktarı", "Piyasada balık fiyatlarının en yüksek olduğu dönemi", "Yetiştiricilikte en kısa sürede hasat yapmayı"],
      c: 1,
      e: "Çözüm-5: B - [MSY (Maximum Sustainable Yield), biyoekonomik bir modeldir. Bir balık stokundan, o stokun uzun vadeli üreme ve büyüme dinamiklerine zarar vermeden, sonsuza dek her yıl çekilebilecek en yüksek av miktarını tanımlar. MSY aşıldığında stoklarda çöküş (aşırı avlanma) başlar.]"
    },
    {
      q: "Balıkçılık yönetiminde \"Müştereklerin Trajedisi\" (Tragedy of the Commons) teorisi su ürünleri sektörü için hangi durumu açıklar?",
      o: ["Balıkçıların kendi aralarında kooperatif kurmasını", "Mülkiyet hakkı olmayan açık deniz kaynaklarının, her bireyin kendi kısa vadeli kârını maksimize etme güdüsüyle aşırı sömürülüp yok edilmesini", "Balık fiyatlarının devlet tarafından sabitlenmesini", "Tüketicilerin balık yeme alışkanlıklarını terk etmesini"],
      c: 1,
      e: "Çözüm-6: B - [Garrett Hardin tarafından ortaya atılan bu kavram; denizler gibi herkesin kullanımına açık olan (ortak mülkiyet) kaynaklarda, bireysel kâr güdüsünün toplumsal ve ekolojik yıkıma (aşırı avlanma ve stokların tükenmesi) yol açtığını ifade eder.]"
    },
    {
      q: "Türkiye'nin dış ticaret dengesi (ihracat ve ithalat) açısından su ürünleri sektörünün genel konumu aşağıdakilerden hangisidir?",
      o: ["Net İthalatçı", "Sadece iç pazara yönelik üretici", "Net İhracatçı", "Dış ticarete kapalı"],
      c: 2,
      e: "Çözüm-7: C - [Türkiye su ürünleri sektörü, ithal ettiğinden çok daha fazlasını ihraç eden, cari açığın kapatılmasına pozitif katkı sağlayan ve istikrarlı döviz girdisi yaratan \"Net İhracatçı\" konumunda stratejik bir tarım-gıda sektörüdür.]"
    },
    {
      q: "Su ürünleri yetiştiriciliğinde işletmelerin kârlılığını belirleyen en önemli biyolojik-ekonomik metrik olan FCR (Yem Dönüşüm Oranı) ne anlama gelir?",
      o: ["Balığın günlük tükettiği su miktarını", "Balıkta 1 kg canlı ağırlık artışı sağlamak için tüketilmesi gereken yem miktarını", "Tesisin yıllık elektrik tüketimini", "Yemin içindeki protein yüzdesini"],
      c: 1,
      e: "Çözüm-8: B - [FCR (Feed Conversion Ratio), verilen yem miktarının kazanılan canlı ağırlığa bölünmesiyle bulunur. Örneğin FCR 1.2 ise, 1 kg balık eti elde etmek için 1.2 kg yem harcanmış demektir. FCR düştükçe birim maliyet düşer, işletmenin verimliliği ve kârlılığı artar.]"
    },
    {
      q: "Su ürünleri yetiştiriciliğinde toplam işletme maliyetlerinin en büyük kısmını (%55 - %65) hangi gider kalemi oluşturmaktadır?",
      o: ["İşçilik ve personel giderleri", "Enerji ve akaryakıt", "Yavru balık alımı", "Yem maliyetleri"],
      c: 3,
      e: "Çözüm-9: D - [Kafes veya havuz sistemlerinde en baskın değişken maliyet yemdir. Yem rasyonlarının içeriğindeki balık unu, balık yağı ve soya gibi hammaddelerin büyük oranda ithalata dayalı olması, bu kalemi işletmelerin finansal yapısında en riskli faktör haline getirir.]"
    },
    {
      q: "İşletmelerin hem hammaddelerini (yem/yavru) döviz cinsinden alıp hem de ürettikleri ürünü yurtdışına dövizle satarak kur dalgalanmalarından kaynaklı finansal riski kendi içlerinde dengelemelerine ne ad verilir?",
      o: ["Arbitraj", "Doğal Hedge (Doğal Korunma)", "İthal İkamesi", "Çapraz Kur Sabitlemesi"],
      c: 1,
      e: "Çözüm-10: B - [İhracatçı su ürünleri firmaları, döviz kurlarındaki artıştan dolayı yem alırken artan maliyetlerini, ürünlerini Euro/Dolar bazında sattıkları için elde ettikleri yüksek döviz gelirleriyle otomatik olarak karşılarlar. Buna finansal literatürde Doğal Hedge denir.]"
    },
    {
      q: "Türkiye, Avrupa pazarında hangi iki balık türünün üretiminde ve ihracatında açık ara pazar lideri konumundadır?",
      o: ["Levrek ve Çipura", "Somon ve Uskumru", "Karides ve Kalamar", "Orkinos ve Kılıç Balığı"],
      c: 0,
      e: "Çözüm-11: A - [Türkiye, özellikle Ege Bölgesi'ndeki açık deniz kafes sistemlerinde yetiştirdiği Levrek (Dicentrarchus labrax) ve Çipura (Sparus aurata) ile Yunanistan ve İspanya'yı geride bırakarak Akdeniz havzasının ve Avrupa'nın en büyük üreticisi konumundadır.]"
    },
    {
      q: "Küresel su ürünleri pazarında \"Türk Somonu\" adıyla markalaşan ve ihracat rekorları kıran ürün aslında biyolojik olarak hangi türdür?",
      o: ["Atlantik Somonu", "Denizde (Karadeniz) büyütülmüş Gökkuşağı Alabalığı", "Kırmızı Benekli Dere Alabalığı", "Pembe Somon"],
      c: 1,
      e: "Çözüm-12: B - [İç sularda (baraj ve göllerde) yumurtadan çıkarılıp belirli bir ağırlığa ulaştırılan Gökkuşağı Alabalıklarının, Karadeniz'deki deniz kafeslerine aktarılarak somon boyutlarına (3-4 kg) ulaştırılıp etinin pigmentlerle renklendirilmesi sonucu elde edilen üründür.]"
    },
    {
      q: "Türkiye'de Orkinos (Ton balığı) yetiştiriciliğini, levrek ve çipura yetiştiriciliğinden ayıran en temel yapısal fark nedir?",
      o: ["Orkinosun tatlı sularda yetiştirilmesi", "Orkinosun yumurtadan kuluçkahanede üretilmeyip, doğadan kotalı olarak avlandıktan sonra kafeslerde besiye (semirtme) alınması", "Orkinos üretiminde hiç yem kullanılmaması", "Orkinosların sadece iç pazarda tüketilmesi"],
      c: 1,
      e: "Çözüm-13: B - [Mavi Yüzgeçli Orkinoslar kapalı sistemde yumurtadan üretilemez (üretimi çok sınırlıdır). Uluslararası kotalar dahilinde Akdeniz'de canlı olarak ağlarla yakalanır, taşıma kafesleriyle çiftliklere getirilir ve aylar boyunca yağlanıp kilo almaları için hamsi/sardalya ile beslenirler.]"
    },
    {
      q: "Orkinos ihracatında Türkiye'nin geleneksel olarak en büyük ve neredeyse tek müşterisi konumundaki ülke aşağıdakilerden hangisidir?",
      o: ["ABD", "Rusya", "Japonya", "Almanya"],
      c: 2,
      e: "Çözüm-14: C - [Türk orkinosları, yüksek yağ oranı ve renk kalitesi nedeniyle Sushi ve Sashimi yapımında kullanılmak üzere dondurulmuş (veya taze uçak kargo ile) neredeyse tamamen Japonya pazarına ihraç edilmektedir.]"
    },
    {
      q: "İhracatta kilogram başına elde edilen döviz gelirini (ihracat birim değerini) artırmak amacıyla bütün balığın fileto, füme veya marine edilmiş porsiyonluk ürünlere dönüştürülmesine ekonomi literatüründe ne ad verilir?",
      o: ["Atıl kapasite kullanımı", "Katma Değer Yaratma", "Damping", "Sürümden kazanma"],
      c: 1,
      e: "Çözüm-15: B - [Ürünün işçilik, teknoloji ve paketleme gibi süreçlerden geçirilerek ilk (hammadde) halinden çok daha yüksek bir fiyata alıcı bulmasına katma değer yaratma denir. Bu, sektörün ucuz hammadde satıcısı olmaktan çıkıp kârlılığını artırmasının temel yoludur.]"
    },
    {
      q: "Su ürünleri işleme sektöründe kullanılan IQF (Individual Quick Freezing) teknolojisinin geleneksel şoklamaya göre temel kalite avantajı nedir?",

  document.getElementById("mainTitle").textContent = `${CURRENT_SUBJECT} Deneme Sınavı`;
  document.getElementById("headerSubject").textContent = CURRENT_SUBJECT;
  document.getElementById("sourceTag").textContent = SOURCE_TEXT;
  document.title = CURRENT_SUBJECT;

  if (performance.navigation.type === performance.navigation.TYPE_RELOAD || !sessionStorage.getItem("session_active")) {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith(storagePrefix())) localStorage.removeItem(k);
    });
    sessionStorage.setItem("session_active", "true");
  }

  let currentQuestions = [];
  let currentIndex = 0;
  let solvedIndex = -1;
  let userAnswers = {};
  let currentSetKey = "";
  let stats = { correct: 0, wrong: 0 };

  function storagePrefix() {
    return "exam_" + CURRENT_SUBJECT.replace(/\s+/g, "_") + "_";
  }

  function setStateKey(index) {
    return storagePrefix() + "state_set_" + index;
  }

  function normalizeQuestion(q, originalIndex) {
    return {
      id: q.id || ("q_" + originalIndex + "_" + Math.random().toString(36).slice(2, 8)),
      originalNo: originalIndex + 1,
      q: q.q,
      o: [...q.o],
      c: q.c,
      e: q.e || "",
      isRetry: q.isRetry || false,
      retryFrom: q.retryFrom || null,
      retryCount: q.retryCount || 0,
      answeredCorrectly: q.answeredCorrectly || false
    };
  }

  function initMenu() {
    const menuGrid = document.getElementById("menuGrid");
    menuGrid.innerHTML = "";

    const totalSets = Math.ceil(questions.length / QUESTIONS_PER_SET);

    let setsPerButton = 1;
    let buttonCount = totalSets;

    if (buttonCount > 10) {
      setsPerButton = 2;
      buttonCount = Math.ceil(totalSets / setsPerButton);
    }

    buttonCount = Math.min(buttonCount, 10);

    for (let i = 0; i < buttonCount; i++) {
      const startSetNo = i * setsPerButton + 1;
      const endSetNo = Math.min(startSetNo + setsPerButton - 1, totalSets);

      const start = (startSetNo - 1) * QUESTIONS_PER_SET;
      const end = Math.min(endSetNo * QUESTIONS_PER_SET, questions.length);

      if (start >= questions.length) continue;

      const key = setStateKey(i);

      const saved = JSON.parse(localStorage.getItem(key) || "null");
      const solved = saved ? Object.keys(saved.userAnswers || {}).length : 0;
      const correct = saved?.stats?.correct || 0;
      const wrong = saved?.stats?.wrong || 0;

      const totalCurrent = saved?.currentQuestions?.length || (end - start);
      const isCompleted = saved ? (solved >= totalCurrent && totalCurrent > 0) : false;

      const label = startSetNo === endSetNo
        ? `Deneme-${startSetNo}`
        : `Deneme-${startSetNo}-${endSetNo}`;

      const btn = document.createElement("button");
      btn.className = `menu-btn ${isCompleted ? "locked" : ""}`;
      btn.innerHTML = `
        <strong>${label}</strong><br>
        <small>${end - start} Soru | Çözülen ${solved} (Doğru ${correct} Yanlış ${wrong})</small>
      `;

      if (!isCompleted) {
        btn.onclick = () => startSet(i, key, start, end);
      }

      menuGrid.appendChild(btn);
    }
  }

  function startSet(idx, key, start, end) {
    currentSetKey = key;

    const saved = JSON.parse(localStorage.getItem(key) || "null");

    if (saved) {
      currentQuestions = saved.currentQuestions;
      currentIndex = saved.currentIndex;
      solvedIndex = saved.solvedIndex;
      userAnswers = saved.userAnswers || {};
      stats = saved.stats || { correct: 0, wrong: 0 };
    } else {
      currentQuestions = questions.slice(start, end).map((q, i) => normalizeQuestion(q, start + i));
      currentIndex = 0;
      solvedIndex = -1;
      userAnswers = {};
      stats = { correct: 0, wrong: 0 };
      saveState();
    }

    document.getElementById("menuContainer").style.display = "none";
    document.getElementById("quizContainer").style.display = "block";
    document.getElementById("headerSubject").textContent = CURRENT_SUBJECT;
    loadQuestion();
    window.scrollTo(0, 0);
  }

  function getQuestionTitle(q) {
    return `Soru-${q.originalNo}: ${q.q}`;
  }

  function loadQuestion() {
    const q = currentQuestions[currentIndex];
    const progress = ((currentIndex + 1) / currentQuestions.length) * 100;

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("footerLeft").textContent = `Kalan: ${Math.max(currentQuestions.length - (currentIndex + 1), 0)}`;
    document.getElementById("footerRight").textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
    document.getElementById("questionText").textContent = getQuestionTitle(q);

    const retryBadge = document.getElementById("retryBadge");
    retryBadge.style.display = q.isRetry ? "block" : "none";

    const optArea = document.getElementById("optionsArea");
    const expArea = document.getElementById("explanationArea");
    optArea.innerHTML = "";
    expArea.style.display = "none";
    expArea.innerHTML = "";

    const letters = ["A", "B", "C", "D"];

    q.o.forEach((opt, idx) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<strong>${letters[idx]})</strong> ${opt}`;

      if (currentIndex <= solvedIndex) {
        btn.disabled = true;
        const userChoice = userAnswers[currentIndex];

        if (idx === userChoice) {
          if (userChoice === q.c) {
            btn.classList.add("correct");
            btn.innerHTML += ` <span class="tick show">✔</span>`;
          } else {
            btn.classList.add("wrong");
          }
        }

        if (userChoice === q.c) {
          expArea.innerHTML = `<strong>Açıklama:</strong> ${q.e}`;
          expArea.style.display = "block";
        } else if (q.isRetry) {
          if (idx === q.c) {
            btn.classList.add("correct");
            btn.innerHTML += ` <span class="tick show">✔</span>`;
          }
          expArea.innerHTML = `<strong>Açıklama:</strong> ${q.e}`;
          expArea.style.display = "block";
        }
      } else {
        btn.onclick = () => selectOption(idx);
      }

      optArea.appendChild(btn);
    });

    document.getElementById("prevBtn").style.visibility = currentIndex > 0 ? "visible" : "hidden";
    document.getElementById("nextBtn").style.visibility = currentIndex <= solvedIndex ? "visible" : "hidden";
  }

  function selectOption(idx) {
    const q = currentQuestions[currentIndex];
    const isCorrect = idx === q.c;

    userAnswers[currentIndex] = idx;
    solvedIndex = Math.max(solvedIndex, currentIndex);

    if (isCorrect) {
      stats.correct++;
      q.answeredCorrectly = true;
    } else {
      stats.wrong++;

      if (!q.isRetry) {
        const retryQuestion = {
          ...q,
          isRetry: true,
          retryFrom: q.originalNo,
          retryCount: 1
        };

        const insertIndex = Math.min(currentIndex + 6, currentQuestions.length);
        currentQuestions.splice(insertIndex, 0, retryQuestion);
      }
    }

    saveState();
    loadQuestion();
  }

  function saveState() {
    localStorage.setItem(currentSetKey, JSON.stringify({
      currentQuestions,
      currentIndex,
      solvedIndex,
      userAnswers,
      stats
    }));
  }

  function goForward() {
    if (currentIndex < solvedIndex) {
      currentIndex++;
    } else if (currentIndex < currentQuestions.length - 1) {
      currentIndex++;
    } else {
      return showMenu();
    }

    saveState();
    loadQuestion();
    window.scrollTo(0, 0);
  }

  function goBack() {
    if (currentIndex > 0) {
      currentIndex--;
      saveState();
      loadQuestion();
      window.scrollTo(0, 0);
    }
  }

  function showMenu() {
    document.getElementById("quizContainer").style.display = "none";
    document.getElementById("menuContainer").style.display = "block";
    initMenu();
    window.scrollTo(0, 0);
  }

  function clearAllStatistics() {
    if (confirm("Tüm veriler sıfırlansın mı?")) {
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith(storagePrefix())) localStorage.removeItem(k);
      });
      initMenu();
    }
  }

  function resetCurrentSet() {
    if (confirm("Bu deneme sıfırlansın mı?")) {
      localStorage.removeItem(currentSetKey);
      showMenu();
    }
  }

  initMenu();
</script>
</body>
